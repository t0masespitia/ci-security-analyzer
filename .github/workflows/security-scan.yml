# Este archivo configura un workflow real de GitHub Actions para ejecutar el analizador.
# Se hizo para demostrar que el proyecto no solo funciona localmente,
# sino que también puede integrarse dentro de un pipeline CI.
# Este workflow instala las dependencias, ejecuta pruebas y analiza un workflow vulnerable de ejemplo.

name: CI Security Analyzer

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  security-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest

      - name: Run analyzer against vulnerable example
        run: python analyzer/main.py examples/vulnerable-workflow.yml
        continue-on-error: true

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@086b8c39b2d35e76a5e5f3d65f0a7d51e9bb6d9e
        with:
          sarif_file: reports/results.sarif
        continue-on-error: true