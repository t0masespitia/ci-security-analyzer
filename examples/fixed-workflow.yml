# Este archivo representa una versión corregida del workflow vulnerable.
# Se hizo para demostrar el ciclo completo del proyecto: primero se detecta una vulnerabilidad,
# luego se aplica una corrección y finalmente se valida que el pipeline queda más seguro.

name: Secure CI

on: pull_request

permissions:
  contents: read

env:
  API_KEY: ${{ secrets.API_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest