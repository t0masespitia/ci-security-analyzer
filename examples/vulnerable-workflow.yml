# CASO DE USO 1: Workflow inseguro que NO pasa
#
# Contexto:
# Este caso representa un equipo que acepta pull requests externos.
# El pipeline está mal configurado porque usa permisos amplios, un evento sensible,
# una action sin hash fijo y una posible clave escrita en texto plano.
#
# Por qué no pasa:
# El analizador detecta riesgos críticos y altos. Por seguridad, el pipeline debe fallar.

name: Vulnerable CI

on: pull_request_target

permissions: write-all

env:
  API_KEY: "123456-secret-key"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest




#----------


# CASO DE USO 2: Workflow seguro que SÍ pasa
#
# Contexto:
# Este caso representa el mismo escenario anterior, pero después de aplicar correcciones.
# El equipo ajusta el pipeline siguiendo buenas prácticas de seguridad en CI/CD.
#
# Cambios realizados:
# - Se reemplaza pull_request_target por pull_request para evitar ejecución sobre código no confiable
# - Se reducen los permisos a solo lectura (principio de mínimo privilegio)
# - Se elimina el secreto en texto plano y se usa GitHub Secrets
# - Se fija la action a un commit SHA para evitar cambios externos no controlados
#
# Por qué sí pasa:
# El analizador no detecta vulnerabilidades porque la configuración ahora cumple
# con prácticas seguras en pipelines de GitHub Actions.


