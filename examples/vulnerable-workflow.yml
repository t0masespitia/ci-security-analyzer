# CASO DE USO 2: Workflow seguro que SÍ pasa
#
# Contexto:
# Este caso representa el mismo escenario anterior, pero después de aplicar correcciones.
# El equipo ajusta el pipeline siguiendo buenas prácticas de seguridad en CI/CD.
#
# Cambios realizados:
# - Se reemplaza pull_request_target por pull_request para evitar ejecución sobre código no confiable
# - Se reducen los permisos a solo lectura (principio de mínimo privilegio)
# - Se elimina el secreto en texto plano y se usa GitHub Secrets
# - Se fija la action a un commit SHA para evitar cambios externos no controlados
#
# Por qué sí pasa:
# El analizador no detecta vulnerabilidades porque la configuración ahora cumple
# con prácticas seguras en pipelines de GitHub Actions.

name: Secure CI

on: pull_request

permissions:
  contents: read

env:
  API_KEY: ${{ secrets.API_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest