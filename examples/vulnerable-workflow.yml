# CASO DE USO 1: Workflow inseguro que NO pasa
#
# Contexto:
# Este caso representa un equipo que acepta pull requests externos.
# El pipeline está mal configurado porque usa permisos amplios, un evento sensible,
# una action sin hash fijo y una posible clave escrita en texto plano.
#
# Por qué no pasa:
# El analizador detecta riesgos críticos y altos. Por seguridad, el pipeline debe fallar.

name: Vulnerable CI

on: pull_request_target

permissions: write-all

env:
  API_KEY: "123456-secret-key"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest